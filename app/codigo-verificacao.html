<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="public/img/favicon.png">
    <link rel="stylesheet" href="public/css/cadastro.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Montserrat+Alternates:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <title>Safety Intelligence - Código</title>
</head>

<body>

    <header class="navbar">
        <div class="logoNav">
            <a href="/index.html" class="logo-link" aria-label="Ir para o início">
                <img src="public/img/marca.png" class="logo" alt="Safety Intelligence">
            </a>
        </div>
    </header>

    <div class="posicao">
        <div class="container container--codigo">

            <h1 class="titulo-pagina">Código</h1>

            <div class="codigo-row" role="group" aria-label="Código de 6 dígitos">
                <input class="codigo-digit" type="text" inputmode="numeric" maxlength="1" pattern="[0-9]*" aria-label="Dígito 1" autocomplete="one-time-code">
                <input class="codigo-digit" type="text" inputmode="numeric" maxlength="1" pattern="[0-9]*" aria-label="Dígito 2" autocomplete="off">
                <input class="codigo-digit" type="text" inputmode="numeric" maxlength="1" pattern="[0-9]*" aria-label="Dígito 3" autocomplete="off">
                <input class="codigo-digit" type="text" inputmode="numeric" maxlength="1" pattern="[0-9]*" aria-label="Dígito 4" autocomplete="off">
                <input class="codigo-digit" type="text" inputmode="numeric" maxlength="1" pattern="[0-9]*" aria-label="Dígito 5" autocomplete="off">
                <input class="codigo-digit" type="text" inputmode="numeric" maxlength="1" pattern="[0-9]*" aria-label="Dígito 6" autocomplete="off">
            </div>

            <button type="button" class="cadastrar btn-pill" id="btn-codigo-confirmar">Confirmar</button>

            <p class="login"><a href="/confirmar-email.html">Voltar</a></p>

        </div>
    </div>

    <script>
        (function () {
            var inputs = document.querySelectorAll('.codigo-digit');
            inputs.forEach(function (input, i) {
                input.addEventListener('input', function (e) {
                    e.target.value = e.target.value.replace(/\D/g, '').slice(0, 1);
                    if (e.target.value && i < inputs.length - 1) {
                        inputs[i + 1].focus();
                    }
                });
                input.addEventListener('keydown', function (e) {
                    if (e.key === 'Backspace' && !e.target.value && i > 0) {
                        inputs[i - 1].focus();
                    }
                });
            });
            inputs[0].addEventListener('paste', function (e) {
                e.preventDefault();
                var text = (e.clipboardData || window.clipboardData).getData('text');
                var digits = text.replace(/\D/g, '').slice(0, 6);
                digits.split('').forEach(function (c, j) {
                    if (inputs[j]) {
                        inputs[j].value = c;
                    }
                });
                if (digits.length >= 6) {
                    inputs[5].focus();
                } else if (digits.length > 0) {
                    inputs[digits.length].focus();
                }
            });
            document.getElementById('btn-codigo-confirmar').addEventListener('click', function () {
                window.location.href = '/alterar-senha.html';
            });
        })();
    </script>

</body>

</html>
