<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/public/img/favicon.png" />
    <link rel="stylesheet" href="/public/css/index.css" />
    <link rel="stylesheet" href="/public/css/dashboard.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Montserrat+Alternates:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <title>Dashboard</title>
  </head>

  <body class="pagina-dashboard">
    <header class="fundoNav">
      <nav class="navbar">
        <div class="logoNav">
          <a href="/index.html" class="logo-link" aria-label="Ir para o início">
            <img class="logo" src="/public/img/marca.png" alt="Logo Safety Intelligence" />
          </a>
        </div>

        <a href="/index.html">
          <button type="button" class="cadastrar cadastrar-sair" id="btn-sair-dashboard"><span>Sair</span></button>
        </a>
      </nav>
    </header>

    <main class="dashboard">
      <section class="dashboard_filtros" aria-label="Filtros">
        <div class="dashboard_filtros-cabecalho">
          <h1 class="dashboard_titulo">Dashboard</h1>
          <button type="button" class="btn-favorito" id="btn-favorito" aria-label="Abrir fixadas" title="Fixadas">
            ★
          </button>
        </div>

        <div class="busca" id="busca_estado">
          <label class="busca_label" for="input_estado">Pesquisar estado</label>
          <div class="busca_campo">
            <span class="busca_icone" aria-hidden="true">🔎</span>
            <input
              id="input_estado"
              class="busca_input"
              type="text"
              autocomplete="off"
              placeholder="Ex.: São Paulo ou SP"
              aria-controls="lista_estados"
              aria-expanded="false"
            />
          </div>

          <div class="busca_dropdown" id="dropdown_estado" hidden>
            <ul class="busca_lista" id="lista_estados"></ul>
          </div>

          <div class="selecionado" aria-live="polite">
            <span class="selecionado_label">Selecionado:</span>
            <strong class="selecionado_valor" id="estado_selecionado">—</strong>
          </div>
        </div>
      </section>

      <section class="dashboard_mapa" aria-label="Mapa do Brasil">
        <div class="mapa">
          <div class="mapa_cabecalho">
            <h2 class="mapa_titulo">Brasil</h2>
            <span class="mapa_dica">Clique em um estado</span>
          </div>

          <div class="mapa_conteudo" id="mapa_brasil" aria-label="Mapa interativo do Brasil"></div>
        </div>
      </section>
    </main>

    <div id="painel-fixadas" class="painel-fixadas" hidden aria-hidden="true">
      <div class="painel-fixadas_inner">
        <header class="painel-fixadas_header">
          <button type="button" class="painel-fixadas_voltar" id="fixadas-voltar" aria-label="Voltar">←</button>
          <h2 class="painel-fixadas_titulo">Fixadas</h2>
          <span aria-hidden="true"></span>
        </header>

        <div class="fixadas-colunas">
          <span class="fixadas-col-cidade">Cidade</span>
          <span class="fixadas-col-idh">IDH</span>
          <span class="fixadas-col-acao" aria-hidden="true"></span>
        </div>

        <div class="fixadas-lista">
          <div class="fixadas-item">
            <span class="fixadas-cidade">São Paulo</span>
            <div class="fixadas-idh-bloco">
              <span class="fixadas-idh-label">IDH</span>
              <span class="fixadas-idh-valor"><span class="fixadas-estrela" aria-hidden="true">★</span> 0,805</span>
            </div>
            <button type="button" class="fixadas-btn-dash" id="fixadas-ver-dashboard">Ver Dashboard</button>
          </div>
        </div>
      </div>
    </div>

    <script src="/public/js/dashboard.js"></script>
  </body>
</html>
