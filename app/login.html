<body>

    <header class="navbar">
        <div class="logoNav">
            <a href="/index.html" class="logo-link" aria-label="Ir para o início">

    <div class="posicao">

            <div class="logoCadastro">

            <label>E-mail</label>
            <input type="email" id="email_input" placeholder="Digite seu e-mail" autocomplete="username">

            <label>Senha</label>
            <input type="password" id="senha_input" placeholder="Digite sua senha" autocomplete="current-password">

            <p class="forgot"><a href="/confirmar-email.html">Esqueceu a senha?</a></p>

            <button type="button" onclick="entrar()" class="cadastrar" id="btn-entrar">Entrar</button>

            <p class="login">Ainda não tem conta? <a href="/cadastro.html">Cadastre-se</a></p>

        </div>
    </div>

     <script>

    //    });
    </script>

</body>

</html>

<script>
    function entrar() {
     
        var emailVar = email_input.value;
        var senhaVar = senha_input.value;

        if (emailVar == "" || senhaVar == "") {
            cardErro.style.display = "block"
            mensagem_erro.innerHTML = "(Mensagem de erro para todos os campos em branco)";
            finalizarAguardar();
            return false;
        }
      

        console.log("FORM LOGIN: ", emailVar);
        console.log("FORM SENHA: ", senhaVar);

        fetch("/usuarios/autenticar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                emailServer: emailVar,
                senhaServer: senhaVar
            })
        }).then(function (resposta) {
            console.log("ESTOU NO THEN DO entrar()!")

            if (resposta.ok) {
                console.log(resposta);

                resposta.json().then(json => {
                    console.log(json);
                    console.log(JSON.stringify(json));
                    sessionStorage.EMAIL_USUARIO = json.email;
                    sessionStorage.NOME_USUARIO = json.nome;
                    sessionStorage.ID_USUARIO = json.idUsuario;

                    setTimeout(function () {
                        window.location = "dashboard.html";
                    }, 1000); // apenas para exibir o loading

                });

            } else {

                console.log("Houve um erro ao tentar realizar o login!");

                resposta.text().then(texto => {
                    console.error(texto);
                    finalizarAguardar(texto);
                });
            }

        }).catch(function (erro) {
            console.log(erro);
        })

        return false;
    }

</script>
