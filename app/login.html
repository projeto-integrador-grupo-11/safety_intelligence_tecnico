<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="public/img/favicon.png">
    <link rel="stylesheet" href="public/css/login.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Montserrat+Alternates:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <title>Safety Intelligence - Login</title>
</head>

<body>

    <header class="navbar">
        <div class="logoNav">
            <a href="/index.html" class="logo-link" aria-label="Ir para o início">
                <img src="public/img/marca.png" class="logo" alt="Safety Intelligence">
            </a>
        </div>
    </header>

    <div class="posicao">
        <div class="container">

            <div class="logoCadastro">
                <img src="public/img/logo.png" alt="">
            </div>

            <label>E-mail</label>
            <input type="email" id="email_input" placeholder="Digite seu e-mail" autocomplete="username">

            <label>Senha</label>
            <input type="password" id="senha_input" placeholder="Digite sua senha" autocomplete="current-password">

            <p class="forgot"><a href="/confirmar-email.html">Esqueceu a senha?</a></p>

            <button type="button" onclick="entrar()" class="cadastrar" id="btn-entrar">Entrar</button>

            <div id="cardErro" style="display:none; color:#b00020; margin-top:10px;">
                <p id="mensagem_erro"></p>
            </div>

            <p class="login">Ainda não tem conta? <a href="/cadastro.html">Cadastre-se</a></p>

        </div>
    </div>

</body>

</html>

<script>
    function mostrarErro(mensagem) {
        var cardErro = document.getElementById("cardErro");
        var mensagem_erro = document.getElementById("mensagem_erro");
        if (cardErro && mensagem_erro) {
            cardErro.style.display = "block";
            mensagem_erro.innerHTML = mensagem;
        }
    }

    function limparErro() {
        var cardErro = document.getElementById("cardErro");
        if (cardErro) cardErro.style.display = "none";
    }

    function entrar() {
        limparErro();

        var emailVar = document.getElementById("email_input").value;
        var senhaVar = document.getElementById("senha_input").value;

        if (emailVar == "" || senhaVar == "") {
            mostrarErro("Preencha e-mail e senha para continuar.");
            return false;
        }

        fetch("/usuarios/autenticar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                emailServer: emailVar,
                senhaServer: senhaVar
            })
        }).then(function (resposta) {
            if (resposta.ok) {
                resposta.json().then(function (json) {
                    sessionStorage.EMAIL_USUARIO = json.email;
                    sessionStorage.NOME_USUARIO = json.nome;
                    sessionStorage.ID_USUARIO = json.id;
                    sessionStorage.setItem("TOKEN_JWT", json.token);

                    setTimeout(function () {
                        window.location = "/dashboard.html";
                    }, 800);
                });
            } else {
                resposta.text().then(function (texto) {
                    console.error(texto);
                    mostrarErro(texto || "E-mail ou senha inválidos.");
                });
            }
        }).catch(function (erro) {
            console.log(erro);
            mostrarErro("Não foi possível conectar ao servidor.");
        });

        return false;
    }

</script>
