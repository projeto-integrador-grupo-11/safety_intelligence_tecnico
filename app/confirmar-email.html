<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="public/css/cadastro.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Montserrat+Alternates:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <title>Safety Intelligence - Confirmar email</title>
</head>

<body>

    <header class="navbar">
        <div class="logoNav">
            <a href="/index.html" class="logo-link" aria-label="Ir para o início">
                <img src="public/img/marca.png" class="logo" alt="Safety Intelligence">
            </a>
        </div>
    </header>

    <div class="posicao">
        <div class="container">

            <div class="logoCadastro">
                <img src="public/img/logo.png" alt="">
            </div>

            <h1 class="titulo-pagina">Confirmar email</h1>

            <label for="email-recuperacao">Email</label>
            <input id="email-recuperacao" type="email" placeholder="Digite seu email" autocomplete="email">

            <p class="texto-ajuda">Insira seu email para alterar a sua senha</p>
            <p class="texto-ajuda">Você receberá um e-mail com o código</p>

            <button type="button" class="cadastrar" id="btn-confirmar-email">Confirmar</button>

            <p class="login"><a href="/login.html">Voltar ao login</a></p>

        </div>
    </div>

    <script>
        document.getElementById('btn-confirmar-email').addEventListener('click', function () {
            window.location.href = '/codigo-verificacao.html';
        });
    </script>

</body>

</html>
